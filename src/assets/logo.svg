<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Soft-gradient background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="birdGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Rounded App Icon Background -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)" />

  <!-- Viewfinder circle -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="6 4" />

  <!-- Bird & Viewfinder Silhouette -->
  <g filter="url(#shadow)">
    <!-- Stylized soaring bird -->
    <path d="M 30 55 
             C 32 45, 40 38, 50 38 
             C 55 32, 62 28, 72 25 
             C 68 36, 64 42, 58 48 
             C 56 58, 48 64, 38 65 
             C 35 65, 31 61, 30 55 Z" 
          fill="url(#birdGrad)" />
    
    <!-- Central camera lens/location circle -->
    <circle cx="50" cy="48" r="5" fill="#1e3a8a" />
    <circle cx="50" cy="48" r="2" fill="#ffffff" />
  </g>

  <!-- Sparkle details to signify premium modern design -->
  <path d="M 78 20 L 80 22 L 78 24 L 76 22 Z" fill="#ffffff" opacity="0.9" />
  <path d="M 22 78 L 23 79 L 22 80 L 21 79 Z" fill="#ffffff" opacity="0.7" />
</svg>
